<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Yellow rounded square background — matches header logo borderRadius:4 on 24px, scaled to 32px -->
  <rect width="32" height="32" rx="5" fill="#fff200"/>

  <!-- Spoke lines from center to each outer node (drawn first so nodes sit on top) -->
  <line x1="16" y1="16" x2="16"   y2="8"    stroke="#000" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="23.6" y2="13.5" stroke="#000" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20.7" y2="22.5" stroke="#000" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="11.3" y2="22.5" stroke="#000" stroke-width="1.9" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="8.4"  y2="13.5" stroke="#000" stroke-width="1.9" stroke-linecap="round"/>

  <!-- Outer satellite nodes — perfect circles at pentagon positions (radius 8 from center) -->
  <circle cx="16"   cy="8"    r="2.4" fill="#000"/>
  <circle cx="23.6" cy="13.5" r="2.4" fill="#000"/>
  <circle cx="20.7" cy="22.5" r="2.4" fill="#000"/>
  <circle cx="11.3" cy="22.5" r="2.4" fill="#000"/>
  <circle cx="8.4"  cy="13.5" r="2.4" fill="#000"/>

  <!-- Center hub: donut ring (matches Material Symbols hub icon design) -->
  <circle cx="16" cy="16" r="3.3" fill="#000"/>
  <circle cx="16" cy="16" r="1.8" fill="#fff200"/>
</svg>
